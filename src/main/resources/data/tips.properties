tip.1.description=Check the online manual: https://github.com/nicho92/MtgDesktopCompanion/wiki
tip.2.description=Don't use a module? Disable it in the Configuration panel.
tip.3.description=Prefer dark mode? Enable it in the Skin menu.
tip.4.description=Need help in a module panel? Click the "?" button in the bottom-right corner.
tip.5.description=Have many cards with French names? Click "Default stock" and save your stock defaults.
tip.6.description=Need local currency conversion? Get an API key at https://currencylayer.com/ and save it in the Configuration panel.
tip.7.description=You can filter any table with Ctrl+F.
tip.8.description=You can choose your card provider in the Configuration panel: MTGJson, Scryfall, and more.
